<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momo Vahed | Portfolio</title>
    <style>
        :root {
            --bg-color: #262626;
            --accent-color: #E8DCC8;
            --text-color: #F0F0F0;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        header {
            padding: 6rem 2rem 4rem;
            text-align: center;
        }
        .logo svg {
            width: 48px;
            height: 48px;
            margin-bottom: 2rem;
        }
        h1 {
            font-weight: 400;
            letter-spacing: 0.15em;
            margin: 0 0 1rem 0;
            font-size: 1.2rem;
            text-transform: uppercase;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2px;
            max-width: 100%;
        }
        .gallery-item {
            position: relative;
            aspect-ratio: 4/3;
            background-color: #1a1a1a;
            overflow: hidden;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .gallery-item:hover img {
            opacity: 1;
            transform: scale(1.03);
        }
        footer {
            text-align: center;
            padding: 4rem 2rem;
            color: #666;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }
        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <rect width="200" height="200" fill="#262626"/>
                <path d="M 40 150 L 40 50 L 100 110 L 160 50 L 160 150 L 135 150 L 135 85 L 100 120 L 65 85 L 65 150 Z" fill="#E8DCC8"/>
            </svg>
        </div>
        <h1>Momo Vahed</h1>
    </header>
    
    <main class="gallery">
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1682687220742-aba13b6e50ba?auto=format&fit=crop&q=80&w=1200" alt="Portfolio entry 1">
        </div>
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1682687982501-1e58f8146396?auto=format&fit=crop&q=80&w=1200" alt="Portfolio entry 2">
        </div>
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1682695796254-bf45fb41a2ce?auto=format&fit=crop&q=80&w=1200" alt="Portfolio entry 3">
        </div>
    </main>

    <footer>
        &copy; 2026 Momo Vahed
    </footer>
</body>
</html>
